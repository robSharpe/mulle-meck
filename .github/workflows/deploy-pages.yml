name: Deploy to GitHub Pages

# Publicerar spelmappen mulle-meck-lokal/ till GitHub Pages vid varje push till main.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Tillåt bara en publicering i taget.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload game folder
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./mulle-meck-lokal

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
